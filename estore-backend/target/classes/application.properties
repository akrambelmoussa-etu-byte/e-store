spring.application.name=estore-backend
spring.profiles.active=dev
server.port=8080

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/estore

# JWT
jwt.secret=change-me-with-a-256-bits-secret-key-for-production-environment-please
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Uploads (images générées par Gemini)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
gemini.api.key=${GEMINI_API_KEY:}
gemini.images.dir=./uploads/products
gemini.images.public-path=/uploads/products

# Logging
logging.level.com.estore=INFO
logging.level.org.springframework.security=WARN
